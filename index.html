<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nikhitha - 1 Year Work Anniversary</title>

  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://code.highcharts.com/modules/accessibility.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      margin: 0;
    }

    .container {
      padding: 20px 15px;
      max-width: 1000px;
      margin: auto;
      text-align: center;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 1rem;
      font-weight: normal;
      margin-bottom: 20px;
      color: #dfe9f3;
    }

    #chart {
      width: 100%;
      height: 300px;
      margin: auto;
      border-radius: 12px;
      overflow: hidden;
    }

    .message {
      margin-top: 20px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 10px;
    }

    .highlight {
      color: #ffd700;
      font-weight: bold;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      background: #ffd700;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      font-size: 0.9rem;
    }

    .btn:hover {
      background: #ffcc00;
    }

    /* Tablet */
    @media (min-width: 768px) {
      h1 {
        font-size: 2.4rem;
      }

      h2 {
        font-size: 1.2rem;
      }

      #chart {
        height: 400px;
      }

      .message {
        font-size: 1.1rem;
        padding: 20px;
      }
    }

    /* Desktop */
    @media (min-width: 1024px) {
      h1 {
        font-size: 2.8rem;
      }

      #chart {
        height: 450px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎉 Nikhitha’s 1 Year Anniversary as Techie 🎉</h1>
  <h2>Celebrating Your Journey as a Senior System Engineer</h2>

  <div id="chart"></div>

  <div class="message" id="message">
    Nikhitha, you’ve successfully completed <span class="highlight">1 amazing year</span>! 🚀  
    Keep building, learning, and growing!
  </div>

  <button class="btn" onclick="celebrate()">Celebrate 🎊</button>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {

    Highcharts.chart('chart', {
      chart: {
        type: 'column',
        backgroundColor: '#ffffff'
      },
      title: {
        text: 'Nikhitha’s 1-Year Growth Journey',
        style: { fontSize: '16px' }
      },
      xAxis: {
        categories: [
          'M1','M2','M3','M4','M5','M6',
          'M7','M8','M9','M10','M11','M12'
        ]
      },
      yAxis: {
        min: 0,
        max: 100
      },
      tooltip: {
        pointFormat: '<b>{point.y}% growth</b>'
      },
      series: [{
        name: 'Progress',
        data: [10, 20, 30, 40, 50, 65, 75, 80, 85, 90, 95, 100],
        colorByPoint: true
      }],
      plotOptions: {
        column: {
          dataLabels: {
            enabled: true,
            format: '{y}%'
          }
        }
      },
      credits: {
        enabled: false
      }
    });

    // 🎊 Auto celebration on load
    celebrate();
  });

  function celebrate() {
    const msg = document.getElementById("message");

    msg.innerHTML =
      "🎉 <span class='highlight'>Congratulations Nikhitha!</span> 🎉<br><br>" +
      "1 year of coding, debugging, learning, and growing stronger every day.<br>" +
      "Your journey as a Software Engineer is just getting started! 💻🚀";

    for (let i = 0; i < 100; i++) {
      let confetti = document.createElement("div");

      confetti.style.position = "fixed";
      confetti.style.width = "6px";
      confetti.style.height = "6px";
      confetti.style.background = "hsl(" + Math.random()*360 + ", 100%, 50%)";
      confetti.style.top = "-10px";
      confetti.style.left = Math.random() * window.innerWidth + "px";
      confetti.style.opacity = 0.8;
      confetti.style.zIndex = 9999;
      confetti.style.borderRadius = "50%";

      document.body.appendChild(confetti);

      let fall = confetti.animate([
        { transform: "translateY(0px)" },
        { transform: "translateY(100vh)" }
      ], {
        duration: 2000 + Math.random() * 2000,
        easing: "linear"
      });

      fall.onfinish = () => confetti.remove();
    }
  }
</script>

</body>
</html>
